plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.10'
}

repositories {
    mavenCentral()
}

dependencies {
    // Spazio vuoto per eventuali librerie future
}

javafx {
    version = "17"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    mainClass = 'it.unicam.cs.mpgc.rpg123436.Main'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}